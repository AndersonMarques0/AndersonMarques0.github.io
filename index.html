<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
    <div class="container-fluid">
      <button class="navbar-brand btn nav-btn text-primary border-0 bg-transparent fw-bold"
        data-face="0">Welcome</button>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><button class="nav-link btn nav-btn" data-face="1">About</button></li>
          <li class="nav-item"><button class="nav-link btn nav-btn" data-face="2">Projects</button></li>
          <li class="nav-item"><button class="nav-link btn nav-btn" data-face="3">Experience</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="scene">
    <div class="cube" id="cube">

      <section class="face face-front custom-welcome-bg">
        <div class="face-scroll-wrapper d-flex flex-column align-items-center justify-content-center">
          <div class="text-center px-4">

            <h1 class="display-3 fw-bolder text-dark mb-3">
              Hello, I'm <br><span class="text-highlight">Anderson da Silva Marques</span>
            </h1>

            <p class="lead text-secondary mb-4 fs-4">
              A Backend Developer crafting sturdy and stable servers.
            </p>

            <div class="d-flex flex-wrap gap-3 justify-content-center mt-4">
              <button class="btn btn-primary btn-lg px-4 py-2 rounded-pill shadow-sm nav-btn fw-bold"
                style="background-color: #90E0EF; border-color: #90E0EF; color: #495057;" data-face="1">
                Get to Know Me
              </button>
              <a href="https://github.com/AndersonMarques0" target="_blank" rel="noopener noreferrer"
                class="btn btn-outline-dark btn-lg px-4 py-2 rounded-pill fw-bold">
                My GitHub
              </a>
              <a href="https://www.linkedin.com/in/anderson-sm/" target="_blank" rel="noopener noreferrer"
                class="btn btn-outline-dark btn-lg px-4 py-2 rounded-pill fw-bold">
                My Linkedin
              </a>
            </div>

          </div>
        </div>
      </section>

      <section class="face face-right">
        <div class="face-scroll-wrapper" id="content-about"></div>
      </section>

      <section class="face face-back">
        <div class="face-scroll-wrapper" id="content-projects"></div>
      </section>

      <section class="face face-left">
        <div class="face-scroll-wrapper" id="content-experience"></div>
      </section>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
